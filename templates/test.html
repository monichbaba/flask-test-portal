<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>📝 Today’s Test</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    h2 { color: #333; }
  </style>
</head>
<body>
  <h2>📝 Today’s Test</h2>
  <form method="POST">
    {% for i in range(questions|length) %}
      <p><strong>Q{{ i+1 }}:</strong> {{ questions[i].q }}</p>
      {% for j in range(questions[i].options|length) %}
        <label>
          <input type="radio" name="q{{ i }}" value="{{ j }}"> {{ questions[i].options[j] }}
        </label><br>
      {% endfor %}
      <hr>
    {% endfor %}
    <button type="submit">Submit</button>
  </form>
</body>
</html>
